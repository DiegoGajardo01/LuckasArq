<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKASARQ - Arquitectura Moderna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }
        
        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a, .lang-selector a {
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }
        
        .nav-links a:hover, .lang-selector a:hover {
            opacity: 0.7;
        }
        
        /* Hero Section - Corrected Layering */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Layer 1: Background Image */
        .hero-background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* Layer 2: Text */
        .hero-title {
            position: absolute;
            top: 37%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-size: 6vw;
            font-weight: 900;
            letter-spacing: 2px;
            color: #000;
            text-align: center;
            width: 100%;
        }
        
        /* Layer 3: PNG House Overlay */
        .hero-house-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            /* The PNG should have transparency to show the text underneath */
            object-fit: cover;
            pointer-events: none; /* Allows clicking through to elements below */
        }
        
        /* Services Section */
        .services-section {
            background-color: #fff;
            padding: 80px 0;
            position: relative;
        }
        
        .services-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            align-items: center;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            flex-grow: 1;
        }
        
        .service-block {
            background-color: #8B4513;
            height: 240px;
            transition: transform 0.3s;
        }
        
        .service-block:hover {
            transform: translateY(-10px);
        }
        
        .services-title {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            font-size: 3.5rem;
            font-weight: 900;
            margin-left: 40px;
            letter-spacing: 2px;
        }
        
        /* Footer */
        footer {
            background-color: #000;
            color: #fff;
            padding: 15px 40px;
        }
        
        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .copyright {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .theme-toggle {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        
        /* Responsive */
        @media (max-width: 992px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .hero-title {
                font-size: 8vw;
            }
        }
        
        @media (max-width: 768px) {
            .services-container {
                flex-direction: column;
            }
            
            .services-title {
                writing-mode: horizontal-tb;
                transform: none;
                margin-left: 0;
                margin-bottom: 30px;
                text-align: center;
            }
        }
        
        @media (max-width: 576px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-links {
                gap: 15px;
            }
            
            header {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Proyectos</a>
            <a href="#">Contacto</a>
        </div>
        <div class="lang-selector">
            <a href="#">ES</a>
        </div>
    </header>
    
    <!-- Hero Section with Correct Layering -->
    <section class="hero-container">
        <!-- Layer 1: Background Image -->
        <img src="bg.png" 
             alt="Fondo arquitectónico" 
             class="hero-background">
        
        <!-- Layer 2: Text -->
        <h1 class="hero-title">LUCKASARQ</h1>
        
        <!-- Layer 3: PNG House Overlay -->
        <img src="recorte.png" 
             alt="Casa arquitectónica" 
             class="hero-house-overlay">
    </section>
    
    <!-- Services Section -->
    <section class="services-section">
        <div class="services-container">
            <div class="services-grid">
                <div class="service-block"></div>
                <div class="service-block"></div>
                <div class="service-block"></div>
                <div class="service-block"></div>
            </div>
            <h2 class="services-title">SERVICIOS</h2>
        </div>
    </section>
    
    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p class="copyright">© 2023 LUCKASARQ. Todos los derechos reservados.</p>
            <div class="theme-toggle">
                <span>☀️</span>
                <span>🌙</span>
            </div>
        </div>
    </footer>
</body>
</html>
